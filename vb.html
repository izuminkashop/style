<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Viber</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f9f9f9;
  color: #444;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.wrapper {
  text-align: center;
  max-width: 340px;
  width: 100%;
  padding: 20px;
  transform: translateY(-70px);
}

/* === ВЕРХНИЙ БЛОК === */
.top {
  margin-bottom: 25px;
}

.icon {
  width: 100px;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

h1 {
  font-size: 2em;
  margin: 10px 0 6px;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 0.3s;
}

.dots {
  margin-top: 6px;
}
.dots span {
  display: inline-block;
  width: 10px;
  height: 10px;
  margin: 0 5px;
  background: #7360f2;
  border-radius: 50%;
  animation: bounce 1s infinite alternate;
}
.dots span:nth-child(2){ animation-delay: .2s }
.dots span:nth-child(3){ animation-delay: .4s }

/* === НИЖНИЙ БЛОК === */
.content {
  margin-top: 10px;
}

/* инструкция (мягкая) */
.instruction {
  font-size: 1.05em;
  line-height: 1.55;
  color: #777;
  margin-bottom: 18px;

  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 0.5s;
}

/* основной текст (акцент) */
.main-text {
  font-size: 1.2em;
  line-height: 1.5;
  color: #444;
  margin-bottom: 10px;

  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 0.7s;
}

/* кнопка */
a.button {
  display: inline-block;
  padding: 12px 22px;
  margin-top: 18px;
  font-size: 1.2em;
  color: #fff;
  background: #7360f2;
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.3s ease;

  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 1s;
}
a.button:hover {
  background: #5a4bd1;
  transform: scale(1.05);
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}

/* анимации */
@keyframes bounce {
  from {transform:translateY(0);opacity:.5}
  to {transform:translateY(-10px);opacity:1}
}

@keyframes fadeIn {
  to {opacity:1}
}

/* адаптив */
@media(max-width: 480px){
  h1 { font-size: 1.8em; }
  .main-text { font-size: 1.1em; }
  .instruction { font-size: 0.95em; }
  a.button { font-size: 1em; padding: 10px 20px; }
  .icon { width: 80px; }
}
</style>
</head>

<body>

<div class="wrapper">

<!-- верх -->
<div class="top">
  <img src="https://www.vectorlogo.zone/logos/viber/viber-tile.svg" class="icon">

  <h1>Відкриваємо Viber</h1>

  <div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- низ -->
<div class="content">

  <div class="instruction">
    Для переходу натисніть на <strong>···</strong> у правому верхньому куті екрана, а потім оберіть <strong>«Відкрити в браузері»</strong>.
  </div>

  <div class="main-text">
    Далі натисніть кнопку нижче, щоб перейти у Viber та зв'язатися з нами.
  </div>

  <a class="button" href="viber://chat?number=%2B380957765663">
    Написати в Viber
  </a>

</div>

</div>

</body>
</html>
