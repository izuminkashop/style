<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Viber</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px 15px;
  background: #f9f9f9;
  color: #444;
  overflow: hidden;
  position: relative;
}

/* Заголовок */
h1 {
  font-size: 2em;
  margin: 15px 0;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 0.3s;
}

/* Текст */
p {
  font-size: 1.2em;
  line-height: 1.5;
  max-width: 90%;
  margin: 8px auto;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 0.6s;
}

/* Кнопка */
a.button {
  display: inline-block;
  padding: 12px 22px;
  margin-top: 20px;
  font-size: 1.2em;
  color: #fff;
  background: #7360f2;
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.3s ease;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 1s;
}
a.button:hover {
  background: #5a4bd1;
  transform: scale(1.05);
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}

/* Логотип */
.icon {
  width: 100px;
  margin-top: 30px;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

/* Точки */
.dots span {
  display: inline-block;
  width: 10px;
  height: 10px;
  margin: 0 5px;
  background: #7360f2;
  border-radius: 50%;
  animation: bounce 1s infinite alternate;
}
.dots span:nth-child(2){ animation-delay: .2s }
.dots span:nth-child(3){ animation-delay: .4s }

@keyframes bounce {
  from {transform:translateY(0);opacity:.5}
  to {transform:translateY(-12px);opacity:1}
}

@keyframes fadeIn {
  to {opacity:1}
}

/* Адаптив */
@media(max-width: 480px){
  h1 { font-size: 1.8em; }
  p { font-size: 1.1em; }
  a.button { font-size: 1em; padding: 10px 20px; }
  .icon { width: 80px; }
}
</style>
</head>

<body>

<!-- Логотип Viber -->
<img src="https://www.vectorlogo.zone/logos/viber/viber-tile.svg" class="icon">

<h1>Відкриваємо Viber</h1>

<div class="dots"><span></span><span></span><span></span></div>

<p>
Натисніть кнопку нижче, щоб перейти у Viber та зв'язатися з нами.
</p>

<a class="button" href="viber://chat?number=%2B380957765663">
Написати в Viber
</a>

<p style="margin-top:35px; font-size:0.95em; color:#777;">
Якщо кнопка не працює, відкрийте посилання&nbsp;вручну:
<br>
https://viber.click/380957765663
</p>

</body>
</html>
