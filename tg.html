<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Izuminka Style</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial, sans-serif;
  text-align: center;
  padding: 40px 20px;
  background: #f9f9f9;
  color: #444;
}

/* Контейнер */
.container {
  max-width: 360px;
  margin: 0 auto;
}

/* Заголовок */
h1 {
  font-size: 28px;
  margin: 15px 0;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

/* Текст */
p {
  font-size: 17px;
  line-height: 1.5;
  margin: 10px 0;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 0.4s;
}

/* Кнопка */
a.button {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 25px;
  font-size: 18px;
  color: #fff;
  background: #229ED9;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 0.7s;
}
a.button:hover {
  background: #1a89bd;
}

/* Логотип */
.icon {
  width: 90px;
  margin: 20px auto;
  display: block;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

/* Точки */
.dots {
  margin: 10px 0 15px;
}
.dots span {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin: 0 4px;
  background: #229ED9;
  border-radius: 50%;
  animation: bounce 1s infinite alternate;
}
.dots span:nth-child(2){ animation-delay: .2s }
.dots span:nth-child(3){ animation-delay: .4s }

@keyframes bounce {
  from { transform: translateY(0); opacity: .5 }
  to { transform: translateY(-8px); opacity: 1 }
}

@keyframes fadeIn {
  to { opacity: 1 }
}

/* Нижний текст */
.small {
  margin-top: 30px;
  font-size: 14px;
  color: #777;
}
</style>
</head>

<body>

<div class="container">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="icon">

<h1>Відкриваємо Telegram</h1>

<div class="dots">
  <span></span><span></span><span></span>
</div>

<p>
Натисніть кнопку нижче, щоб перейти в наш Telegram<br>
та переглянути актуальні новинки.
</p>

<a class="button" href="https://t.me/+w6bnHtW-4xc4OWJi">
Перейти в Telegram
</a>

<p class="small">
Якщо кнопка не працює, відкрийте посилання вручну:<br>
https://t.me/+w6bnHtW-4xc4OWJi
</p>

</div>

</body>
</html>
